# MARK: - StreakSync SwiftLint Configuration

# Paths
included:
  - StreakSync
  - StreakSyncShareExtension
  - StreakSyncTests

excluded:
  - Carthage
  - Pods
  - .build
  - DerivedData
  - .swiftpm

# Reporter
reporter: "xcode"

# Rules to opt in — kept rules have clear production value
opt_in_rules:
  # Safety & correctness
  - force_unwrapping
  - implicitly_unwrapped_optional
  - identical_operands
  - overridden_super_call
  - prohibited_super_call
  - fatal_error_message
  - unavailable_function
  - fallthrough
  - untyped_error_in_catch
  - required_enum_case

  # Performance & best practices
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - first_where
  - last_where
  - sorted_first_last
  - flatmap_over_map_reduce
  - reduce_into
  - array_init
  - explicit_init
  - legacy_random
  - toggle_bool
  - convenience_type
  - redundant_nil_coalescing
  - joined_default_parameter

  # Code hygiene
  - sorted_imports
  - file_header
  - file_name_no_space
  - modifier_order
  - redundant_type_annotation
  - lower_acl_than_parent
  - strict_fileprivate
  - prohibited_interface_builder
  - ibinspectable_in_extension
  - override_in_extension
  - prefer_self_type_over_type_of_self
  - xct_specific_matcher
  - yoda_condition

  # Formatting (lightweight, non-controversial)
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - colon
  - comma
  - literal_expression_end_indentation
  - multiline_literal_brackets
  - multiline_parameters_brackets
  - no_space_in_method_call
  - operator_usage_whitespace
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

# Disabled rules
disabled_rules:
  - todo

# Analyzer-only rules
analyzer_rules:
  - unused_declaration
  - unused_import

# Rule Configurations

line_length:
  warning: 120
  error: 150
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 400
  error: 500
  ignore_comment_only_lines: true

function_body_length:
  warning: 50
  error: 80

function_parameter_count:
  warning: 6
  error: 8

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 40
    error: 50
  excluded:
    - iPhone
    - URL
    - ID

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 50
  excluded:
    - id
    - url
    - x
    - y
    - z

cyclomatic_complexity:
  warning: 10
  error: 15

nesting:
  type_level:
    warning: 2
    error: 3

# Force unwrapping
force_unwrapping:
  severity: error

# Required file header format
file_header:
  required_pattern: |
                    \/\/
                    \/\/  .*\.swift
                    \/\/  StreakSync.*
                    \/\/
                    \/\/  .*

# Whitespace cleanup
trailing_whitespace:
  ignores_empty_lines: true
  ignores_comments: false

# Custom project-specific rules
custom_rules:
  no_print_statements:
    name: "No Print Statements in Production"
    regex: '\bprint\s*\('
    message: "Use Logger instead of print statements"
    severity: warning

  no_force_try:
    name: "No Force Try"
    regex: '\btry!\s'
    message: "Use proper error handling instead of try!"
    severity: error

  no_force_cast:
    name: "No Force Cast"
    regex: '\bas!\s'
    message: "Use safe casting with 'as?' and proper error handling"
    severity: error

  proper_logging:
    name: "Use Logger Instead of Print"
    regex: 'print\s*\('
    message: "Use Logger from OSLog framework instead of print"
    severity: warning

# Linting thresholds
warning_threshold: 400
